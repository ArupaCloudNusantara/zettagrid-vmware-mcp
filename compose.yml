services:
  zettagrid-mcp:
    build: .
    container_name: zettagrid-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"   # Bind to localhost only — expose externally via Tailscale or SSH tunnel
    env_file:
      - .env
    environment:
      - TRANSPORT=http
      - PORT=3001
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
